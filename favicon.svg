<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- fundo -->
  <rect width="64" height="64" rx="12" fill="#E8DCC5"/>

  <!-- moldura polaroid de trás, levemente girada -->
  <g transform="rotate(-8 32 34)">
    <rect x="12" y="10" width="30" height="36" rx="1.5" fill="#F4F1EA" stroke="#8A6535" stroke-width="1"/>
    <rect x="15" y="13" width="24" height="22" fill="#B5573C"/>
    <rect x="15" y="13" width="24" height="22" fill="#5C8384" opacity="0.35"/>
  </g>

  <!-- moldura polaroid da frente -->
  <g transform="rotate(7 32 34)">
    <rect x="18" y="14" width="30" height="36" rx="1.5" fill="#EFE7D6" stroke="#4a453d" stroke-width="1.2"/>
    <rect x="21.5" y="17.5" width="23" height="22" fill="#D19A56"/>
    <rect x="21.5" y="17.5" width="23" height="22" fill="#3A352C" opacity="0.25"/>
    <!-- sol/vinheta simples -->
    <circle cx="38" cy="23" r="3.2" fill="#F4F1EA" opacity="0.85"/>
  </g>
</svg>
